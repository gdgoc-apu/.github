name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: input
    id: repository
    attributes:
      label: Project or repository
      description: Which GDGoC APU project would this feature belong to?
      placeholder: e.g. event platform, .github
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What problem does this feature solve? Who would benefit?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or improvement you would like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you thought about

  - type: dropdown
    id: contribute
    attributes:
      label: Willing to contribute?
      description: Are you interested in helping implement this?
      options:
        - "Yes, I can open a pull request"
        - "Yes, but I need guidance"
        - "No, just suggesting"
    validations:
      required: true
